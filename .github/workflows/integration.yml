name: integration

# Exercises the real classify→DB persistence path against a live Postgres.
# The mocked Playwright suite can't catch a broken DB write; this can.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  db-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flow_test
      RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply Prisma schema to test database
        run: npx prisma db push
      - name: Run DB integration tests
        run: npx vitest run tests/db-integration.test.ts
